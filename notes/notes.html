<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملاحظاتي الذكية | نظام المديونيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../dashboard.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">
            <i class="fa-solid fa-note-sticky" style="color: #f39c12;"></i>
            <span>ملاحظاتي الذكية</span>
        </div>
        <a href="../dashboard.html" class="btn-back">
            <i class="fa-solid fa-arrow-right"></i> عودة للوحة
        </a>
    </nav>

    <main class="dashboard-container">
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="noteSearch" placeholder="ابحث في عنوان أو محتوى الملاحظات...">
        </div>

        <div class="notes-masonry-grid">
            
            <div class="note-card add-note-trigger" id="openModalBtn">
                <i class="fa-solid fa-square-plus" style="font-size: 32px; color: #4361ee;"></i>
                <span style="font-weight: 600; font-size: 13.5px; color: #4361ee;">إضافة ملاحظة جديدة...</span>
            </div>
            
            <div id="notesContainer" style="display: contents;"></div>
        </div>
    </main>

    <div class="note-modal-overlay" id="noteModalOverlay">
        <div class="note-modal">
            <input type="text" id="modalNoteTitle" class="note-input-title" placeholder="العنوان (اختياري)">
            <textarea id="modalNoteBody" class="note-input-body" placeholder="اكتب ملاحظتك هنا..."></textarea>
            
            <div class="modal-actions-row">
                <button class="btn-modal btn-modal-delete" id="deleteNoteBtn" style="display: none;"><i class="fa-solid fa-trash-can"></i> حذف</button>
                <button class="btn-modal btn-modal-close" id="closeModalBtn">إغلاق</button>
                <button class="btn-modal btn-modal-save" id="saveNoteBtn">حفظ</button>
            </div>
        </div>
    </div>

    <script type="module" src="notes.js?v=2"></script>
</body>
</html>
