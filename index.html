<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سيستم المديونيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>

<body>

    <div class="card login-card">
        <h2>تسجيل دخول الإدارة</h2>
        <form id="loginForm" autocomplete="on">

            <div class="modern-form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" name="email" autocomplete="username" placeholder="admin@example.com"
                    required>
            </div>

            <div class="modern-form-group" style="margin-top: 20px;">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="password" autocomplete="current-password"
                    placeholder="••••••••" required>
            </div>

            <button type="submit" id="loginBtn">دخول</button>

            <div style="text-align: center; margin-top: 15px;">
                <strong> <a href="register/register.html"
                        style="font-size: 13px; color: #4361ee; text-decoration: none; font-family: 'Rubik';">إنشاء حساب
                        جديد</a>
                </strong>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/login.js?v=3"></script>
</body>

</html>
